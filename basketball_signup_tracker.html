
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.dash { padding: 1rem 0; font-family: var(--font-sans); }
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
.metric-value { font-size: 24px; font-weight: 500; color: var(--color-text-primary); }
.section-title { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
.chart-area { position: relative; width: 100%; height: 200px; margin-bottom: 1.5rem; }
.tabs { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.tab { font-size: 13px; padding: 5px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.tab.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
.player-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; }
.player-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; }
.player-meta { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 5px; }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); margin-bottom: 6px; }
.badge-new { background: #E1F5EE; color: #0F6E56; }
.badge-faded { background: #FAECE7; color: #993C1D; }
.badge-active { background: #E6F1FB; color: #185FA5; }
.badge-occasional { background: #F1EFE8; color: #5F5E5A; }
.dot-row { display: flex; gap: 3px; flex-wrap: nowrap; margin-top: 4px; }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot-yes { background: #1D9E75; }
.dot-no { background: #E24B4A; }
.dot-absent { background: var(--color-border-tertiary); }
.legend { display: flex; gap: 16px; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 12px; flex-wrap: wrap; }
.legend span { display: flex; align-items: center; gap: 5px; }
.legend .dot { width: 8px; height: 8px; }
.search-wrap { margin-bottom: 12px; }
.search-wrap input { width: 100%; max-width: 320px; font-size: 13px; }
.chart-legend { display: flex; gap: 16px; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; }
.chart-legend span { display: flex; align-items: center; gap: 5px; }
.legend-sq { width: 10px; height: 10px; border-radius: 2px; }
</style>

<div class="dash">
<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">Church basketball attendance tracker, Feb–May 2026</h2>

<div class="metrics" id="metrics"></div>

<p class="section-title">Signups vs actual attendance per session</p>
<div class="chart-legend">
  <span><span class="legend-sq" style="background:#378ADD"></span>Attended</span>
  <span><span class="legend-sq" style="background:#B5D4F4"></span>Signed up, didn't come</span>
</div>
<div class="chart-area">
  <canvas id="attendChart" role="img" aria-label="Stacked bar chart of basketball signups vs attendance per session, Feb to May 2026"></canvas>
</div>

<p class="section-title">Player directory</p>
<div class="tabs">
  <button class="tab active" onclick="setTab('all')">All players</button>
  <button class="tab" onclick="setTab('active')">Active regulars</button>
  <button class="tab" onclick="setTab('new')">Newcomers</button>
  <button class="tab" onclick="setTab('faded')">Stopped coming</button>
</div>
<div class="legend">
  <span><span class="dot dot-yes"></span>Attended</span>
  <span><span class="dot dot-no"></span>Signed up, didn't come</span>
  <span><span class="dot dot-absent"></span>Not signed up</span>
</div>
<div class="search-wrap"><input type="text" id="search" placeholder="Search player…" oninput="render()"></div>
<div class="player-grid" id="grid"></div>
</div>

// Junk accounts to exclude
const JUNK = new Set(["test","fake dye","josh","danyo","daniel.ye@live.com","danielyiliye@gmail.com","josh (daniel.ye@live.com)"]);

function buildPlayers() {
  const map = {};
  SESS_KEYS.forEach(key => {
    const seen = new Set();
    (RAW[key]||[]).forEach(r => {
      const [cEmail, cName] = canonical(r.email, r.name);
      if (JUNK.has(r.name.toLowerCase()) || JUNK.has(r.email.toLowerCase())) return;
      if (seen.has(cEmail)) return;
      seen.add(cEmail);
      if (!map[cEmail]) map[cEmail] = { name: cName, email: cEmail, sessions: {} };
      if (cName.length > map[cEmail].name.length) map[cEmail].name = cName;
      map[cEmail].sessions[key] = r.a === "Yes" ? "yes" : "no";
    });
  });
  return Object.values(map);
}

const players = buildPlayers();
const RECENT = SESS_KEYS.slice(-3);
const OLDER = SESS_KEYS.slice(0, SESS_KEYS.length - 3);
const NEW_THRESHOLD_IDX = SESS_KEYS.indexOf("may4");

function classify(p) {
  const firstSess = SESS_KEYS.find(k => p.sessions[k]);
  const firstIdx = SESS_KEYS.indexOf(firstSess);
  const recentActive = RECENT.some(k => p.sessions[k]);
  const olderActive = OLDER.some(k => p.sessions[k]);
  const attended = SESS_KEYS.filter(k => p.sessions[k]==="yes").length;
  if (firstIdx >= NEW_THRESHOLD_IDX && !olderActive) return "new";
  if (!recentActive && olderActive) return "faded";
  if (attended >= 5) return "active";
  return "occasional";
}

const categorized = players.map(p => ({...p, category: classify(p)}));

document.getElementById("metrics").innerHTML = `
  <div class="metric"><div class="metric-label">Total players</div><div class="metric-value">${categorized.length}</div></div>
  <div class="metric"><div class="metric-label">Active regulars</div><div class="metric-value">${categorized.filter(p=>p.category==="active").length}</div></div>
  <div class="metric"><div class="metric-label">Newcomers</div><div class="metric-value">${categorized.filter(p=>p.category==="new").length}</div></div>
  <div class="metric"><div class="metric-label">Stopped coming</div><div class="metric-value">${categorized.filter(p=>p.category==="faded").length}</div></div>
`;

const attended = SESS_KEYS.map(k => (RAW[k]||[]).filter(r=>r.a==="Yes").length);
const noShows  = SESS_KEYS.map(k => (RAW[k]||[]).filter(r=>r.a!=="Yes").length);

new Chart(document.getElementById("attendChart"), {
  type:"bar",
  data:{
    labels: SESSIONS.map(s=>s.date),
    datasets:[
      { label:"Attended",       data:attended, backgroundColor:"#378ADD", borderRadius:3, stack:"s" },
      { label:"Didn't attend",  data:noShows,  backgroundColor:"#B5D4F4", borderRadius:3, stack:"s" },
    ]
  },
  options:{
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{ display:false } },
    scales:{
      y:{ beginAtZero:true, stacked:true, ticks:{stepSize:5}, grid:{color:"rgba(128,128,128,0.1)"} },
      x:{ stacked:true, grid:{display:false}, ticks:{font:{size:11}} }
    }
  }
});

let currentTab = "all";
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t => {
    const labels = {all:"all players",active:"active",new:"newcomers",faded:"stopped"};
    t.classList.toggle("active", t.textContent.toLowerCase().includes(labels[tab]));
  });
  render();
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  let subset = categorized;
  if (currentTab !== "all") subset = subset.filter(p => p.category === currentTab);
  if (q) subset = subset.filter(p => p.name.toLowerCase().includes(q));
  subset = [...subset].sort((a,b) => a.name.localeCompare(b.name));

  const badgeMap = {
    new:["badge-new","Newcomer"],
    faded:["badge-faded","Stopped coming"],
    active:["badge-active","Regular"],
    occasional:["badge-occasional","Occasional"]
  };

  document.getElementById("grid").innerHTML = subset.map(p => {
    const [cls, label] = badgeMap[p.category];
    const dots = SESS_KEYS.map((k,i) => {
      const v = p.sessions[k];
      const cls2 = v==="yes"?"dot-yes":v==="no"?"dot-no":"dot-absent";
      return `<div class="dot ${cls2}" title="${SESSIONS[i].date}: ${v==="yes"?"attended":v==="no"?"signed up, didn't come":"not signed up"}"></div>`;
    }).join("");
    const att = SESS_KEYS.filter(k=>p.sessions[k]==="yes").length;
    const sig = SESS_KEYS.filter(k=>p.sessions[k]).length;
    return `<div class="player-card">
      <div class="badge ${cls}">${label}</div>
      <div class="player-name">${p.name}</div>
      <div class="player-meta">${att} attended · ${sig} signed up · ${SESS_KEYS.length} sessions</div>
      <div class="dot-row">${dots}</div>
    </div>`;
  }).join("");
}

render();
